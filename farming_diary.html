<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2d5a1b">
<title>農業日記</title>
<style>
:root{--gd:#2d5a1b;--g:#3d7a25;--gm:#5a9e3a;--gl:#e8f5e0;--gp:#f4faf0;--am:#e8a020;--al:#fef8e8;--bl:#2563a8;--bll:#e8f0fb;--rd:#c0392b;--rl:#fdecea;--tx:#1a2e0f;--tm:#4a6035;--ts:#7a9060;--br:#c5deb0;--bg:#f8fbf5;--wh:#ffffff;--sh:0 2px 12px rgba(45,90,27,.10);--ra:14px;--ras:8px;--tap:48px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:'Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;color:var(--tx);overscroll-behavior:none;}
.screen{display:none;flex-direction:column;height:100dvh;}
.screen.active{display:flex;}
.topbar{background:var(--gd);color:#fff;padding:14px 16px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.18);}
.topbar-back{width:38px;height:38px;background:rgba(255,255,255,.15);border:none;border-radius:50%;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.topbar h1{font-size:17px;font-weight:600;flex:1;}
.topbar-sub{font-size:12px;opacity:.8;}
.scroll-body{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;}
.scroll-body.np{padding:0;}
.bottom-nav{background:var(--wh);border-top:1px solid var(--br);display:flex;flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 12px;border:none;background:transparent;color:var(--ts);font-size:10px;cursor:pointer;gap:3px;}
.nav-btn.active{color:var(--gd);}
.nav-btn svg{width:22px;height:22px;}
/* HOME */
.home-hero{background:var(--gd);color:#fff;padding:20px 16px 22px;}
.home-hero h2{font-size:21px;font-weight:700;margin-bottom:3px;}
.home-hero p{font-size:13px;opacity:.75;}
.home-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:14px;}
.sbox{background:var(--wh);border-radius:var(--ra);padding:13px 8px;text-align:center;box-shadow:var(--sh);}
.sbox .num{font-size:24px;font-weight:700;color:var(--gd);line-height:1;}
.sbox .lbl{font-size:11px;color:var(--ts);margin-top:4px;}
.home-actions{padding:0 14px 14px;display:flex;flex-direction:column;gap:10px;}
.big-btn{width:100%;min-height:var(--tap);padding:13px 16px;border-radius:var(--ra);border:none;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:var(--sh);}
.big-btn svg{width:22px;height:22px;flex-shrink:0;}
.big-btn.green{background:var(--g);color:#fff;}
.big-btn.amber{background:var(--am);color:#fff;}
.sec-hd{font-size:12px;font-weight:600;color:var(--ts);margin:0 0 9px;letter-spacing:.05em;}
.recent-wrap{padding:0 14px 20px;}
.ecard{background:var(--wh);border-radius:var(--ra);padding:13px;box-shadow:var(--sh);margin-bottom:10px;}
.etop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
.edate{font-size:13px;color:var(--ts);font-weight:500;}
.ewrow{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:3px;}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;}
.tag.wx{background:var(--al);color:#8a5a00;}
.tag.crop{background:var(--gl);color:var(--gd);}
.tag.hv{background:var(--bll);color:var(--bl);}
.ework{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:3px;}
.enotes{font-size:13px;color:var(--tm);line-height:1.5;}
.ephotos{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;}
.ephoto{width:70px;height:70px;object-fit:cover;border-radius:var(--ras);border:1px solid var(--br);}
.del-btn{width:32px;height:32px;border:none;background:var(--rl);border-radius:50%;color:var(--rd);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* FORM */
.fcard{background:var(--wh);border-radius:var(--ra);padding:15px;box-shadow:var(--sh);margin-bottom:12px;}
.field{margin-bottom:15px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--ts);margin-bottom:5px;letter-spacing:.04em;}
.field input,.field textarea,.field select{width:100%;padding:11px 13px;border:1.5px solid var(--br);border-radius:var(--ras);font-size:16px;color:var(--tx);background:var(--bg);font-family:inherit;-webkit-appearance:none;appearance:none;}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--gm);background:var(--wh);}
.field textarea{min-height:88px;resize:none;line-height:1.55;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px;}
.chip-row{display:flex;gap:7px;flex-wrap:wrap;}
.chip{padding:8px 13px;border:1.5px solid var(--br);border-radius:99px;font-size:14px;cursor:pointer;background:var(--wh);color:var(--tm);font-weight:500;min-height:var(--tap);display:flex;align-items:center;}
.chip.sel-wx{background:var(--am);color:#fff;border-color:var(--am);}
.chip.sel-cat{background:var(--bl);color:#fff;border-color:var(--bl);}
.vtrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px;}
.vtag{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;background:var(--gl);color:var(--gd);border-radius:99px;font-size:13px;font-weight:500;}
.vtag button{background:none;border:none;color:var(--gd);font-size:15px;cursor:pointer;padding:0;width:18px;height:18px;display:flex;align-items:center;justify-content:center;}
.arow{display:flex;gap:7px;}
.arow input{flex:1;}
.arow button{min-width:58px;padding:0 12px;border:none;background:var(--g);color:#fff;border-radius:var(--ras);font-size:15px;font-weight:600;cursor:pointer;min-height:var(--tap);}
.pdrop{border:2px dashed var(--br);border-radius:var(--ra);padding:20px;text-align:center;cursor:pointer;color:var(--ts);font-size:14px;background:var(--bg);}
.pdrop input{display:none;}
.thumbrow{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;}
.twrap{position:relative;width:74px;height:74px;}
.twrap img{width:74px;height:74px;object-fit:cover;border-radius:var(--ras);border:1px solid var(--br);}
.twrap .rm{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:var(--rd);color:#fff;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.save-btn{width:100%;min-height:52px;background:var(--gd);color:#fff;border:none;border-radius:var(--ra);font-size:17px;font-weight:700;cursor:pointer;letter-spacing:.02em;}
/* EXPENSE */
.exp-hero{background:var(--gd);color:#fff;padding:16px;display:flex;justify-content:space-between;align-items:center;}
.exp-hero .tl{font-size:12px;opacity:.75;}
.exp-hero .ta{font-size:28px;font-weight:700;}
.exp-row-item{display:flex;align-items:center;gap:9px;padding:13px 14px;border-bottom:1px solid var(--br);background:var(--wh);}
.exp-row-item:last-child{border-bottom:none;}
.ecb{font-size:11px;font-weight:600;padding:3px 8px;border-radius:99px;background:var(--bll);color:var(--bl);white-space:nowrap;}
.einfo{flex:1;min-width:0;}
.edesc{font-size:14px;font-weight:500;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.edatesmall{font-size:11px;color:var(--ts);}
.eamt{font-size:15px;font-weight:700;color:var(--tx);white-space:nowrap;}
.fab{position:sticky;bottom:16px;float:right;margin-right:4px;width:56px;height:56px;border-radius:50%;background:var(--gd);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(45,90,27,.35);display:flex;align-items:center;justify-content:center;}
/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--wh);border-bottom:1px solid var(--br);}
.cal-nav button{width:40px;height:40px;border:1.5px solid var(--br);border-radius:50%;background:transparent;color:var(--tx);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-title{font-size:17px;font-weight:700;color:var(--gd);}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:var(--gl);}
.cdow{text-align:center;font-size:11px;font-weight:600;color:var(--ts);padding:7px 0;}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--br);}
.ccell{background:var(--wh);min-height:66px;padding:4px 3px;}
.ccell.other{background:var(--bg);}
.ccell.today .cnum{background:var(--gd);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cnum{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:2px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.ccell.other .cnum{color:var(--br);}
.cdots{display:flex;flex-direction:column;gap:2px;}
.cpip{font-size:9px;border-radius:3px;padding:1px 3px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cpip.work{background:var(--gl);color:var(--gd);}
.cpip.money{background:var(--al);color:#8a5a00;}
.cpip.hv{background:var(--bll);color:var(--bl);}
.cal-legend{display:flex;gap:12px;padding:9px 14px;background:var(--wh);border-top:1px solid var(--br);flex-wrap:wrap;}
.cal-legend span{font-size:11px;color:var(--ts);display:flex;align-items:center;gap:4px;}
.ldot{width:10px;height:10px;border-radius:2px;}
/* PRINT */
.print-ctrl{padding:13px 14px;background:var(--wh);border-bottom:1px solid var(--br);display:flex;gap:10px;align-items:center;}
.print-ctrl select{flex:1;font-size:15px;padding:10px 12px;border:1.5px solid var(--br);border-radius:var(--ras);background:var(--bg);color:var(--tx);-webkit-appearance:none;}
.print-ctrl button{padding:10px 16px;background:var(--gd);color:#fff;border:none;border-radius:var(--ras);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;min-height:var(--tap);}
.pt{font-size:17px;font-weight:700;color:var(--gd);margin-bottom:13px;padding-bottom:9px;border-bottom:2px solid var(--gl);}
.pe{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--br);}
.pe:last-of-type{border-bottom:none;}
.pmeta{font-size:12px;color:var(--ts);margin-bottom:3px;display:flex;gap:7px;flex-wrap:wrap;}
.pwork{font-size:15px;font-weight:600;margin-bottom:2px;}
.pnotes{font-size:13px;color:var(--tm);line-height:1.5;}
.phv{font-size:13px;color:var(--bl);margin-top:3px;}
.pexp{margin-top:18px;padding-top:13px;border-top:2px solid var(--gl);}
.pexp h3{font-size:15px;font-weight:700;color:var(--gd);margin-bottom:9px;}
.perow{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--br);color:var(--tm);}
.petotal{display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-top:7px;color:var(--tx);}
.empty-st{text-align:center;padding:44px 20px;color:var(--ts);font-size:15px;}
/* OCR */
.ocr-paste{width:100%;min-height:108px;font-size:14px;padding:11px;border:1.5px solid var(--br);border-radius:var(--ras);background:var(--bg);color:var(--tx);font-family:monospace;resize:none;}
.ocr-btn{width:100%;min-height:var(--tap);background:var(--am);color:#fff;border:none;border-radius:var(--ras);font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;}
.oi{background:var(--wh);border:1.5px solid var(--br);border-radius:var(--ras);padding:11px;margin-bottom:7px;}
.oirow{display:flex;gap:7px;margin-bottom:7px;}
.oirow input,.oirow select{font-size:14px;padding:7px 9px;border:1.5px solid var(--br);border-radius:var(--ras);background:var(--bg);color:var(--tx);-webkit-appearance:none;}
.oidesc{flex:1;}
.oiamt{width:88px;}
.oicat{width:100px;}
.oiadd{width:100%;min-height:40px;background:var(--gl);color:var(--gd);border:none;border-radius:var(--ras);font-size:13px;font-weight:600;cursor:pointer;}
.oiadd.done{background:var(--bg);color:var(--ts);}
.oiall{width:100%;min-height:var(--tap);background:var(--g);color:#fff;border:none;border-radius:var(--ras);font-size:15px;font-weight:600;cursor:pointer;margin-top:9px;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg);}}
/* SHEET */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;}
.overlay.open{display:block;}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--wh);border-radius:20px 20px 0 0;padding:14px 14px 34px;z-index:101;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);max-height:93dvh;overflow-y:auto;}
.sheet.open{transform:translateY(0);}
.shandle{width:38px;height:4px;background:var(--br);border-radius:2px;margin:0 auto 14px;}
.stitle{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:14px;}
/* LIGHTBOX */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;}
#lb.open{display:flex;}
#lb img{max-width:96vw;max-height:90dvh;border-radius:var(--ra);}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="s-home">
  <div class="topbar">
    <h1>農業日記</h1>
    <span class="topbar-sub" id="hd"></span>
  </div>
  <div class="scroll-body np" style="overflow-y:auto;">
    <div class="home-hero"><h2 id="hg">こんにちは</h2><p id="hs">今日も記録をつけましょう</p></div>
    <div class="home-stats">
      <div class="sbox"><div class="num" id="st1">0</div><div class="lbl">総記録</div></div>
      <div class="sbox"><div class="num" id="st2">0</div><div class="lbl">今月</div></div>
      <div class="sbox"><div class="num" id="st3">¥0</div><div class="lbl">今月費用</div></div>
    </div>
    <div class="home-actions">
      <button class="big-btn green" onclick="goRec()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        今日の記録をつける
      </button>
      <button class="big-btn amber" onclick="goExp()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
        費用・レシートを記録する
      </button>
    </div>
    <div class="recent-wrap">
      <div class="sec-hd">最近の記録</div>
      <div id="recent"></div>
    </div>
  </div>
  <nav class="bottom-nav" id="bn-home">
    <button class="nav-btn active" onclick="go('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>ホーム</span></button>
    <button class="nav-btn" onclick="go('list')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span>記録一覧</span></button>
    <button class="nav-btn" onclick="go('cal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>カレンダー</span></button>
    <button class="nav-btn" onclick="go('exp')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span>費用</span></button>
    <button class="nav-btn" onclick="go('print')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg><span>印刷</span></button>
  </nav>
</div>

<!-- RECORD FORM -->
<div class="screen" id="s-rec">
  <div class="topbar">
    <button class="topbar-back" onclick="go('home')">&#8592;</button>
    <h1>日記を書く</h1>
  </div>
  <div class="scroll-body">
    <div class="fcard">
      <div class="frow">
        <div class="field" style="margin:0;"><label>日付</label><input type="date" id="rd"></div>
        <div class="field" style="margin:0;"><label>気温(°C)</label><input type="number" id="rt" placeholder="24"></div>
      </div>
      <div class="field"><label>天気</label>
        <div class="chip-row">
          <button class="chip" onclick="sc(this,'wx','晴れ')">☀ 晴れ</button>
          <button class="chip" onclick="sc(this,'wx','くもり')">☁ くもり</button>
          <button class="chip" onclick="sc(this,'wx','雨')">☂ 雨</button>
          <button class="chip" onclick="sc(this,'wx','強雨')">⛈ 強雨</button>
          <button class="chip" onclick="sc(this,'wx','雪')">❄ 雪</button>
        </div>
      </div>
      <div class="field"><label>野菜・作物</label>
        <div class="vtrow" id="vtags"></div>
        <div class="arow"><input type="text" id="vi" placeholder="例: トマト"><button onclick="addV()">追加</button></div>
      </div>
      <div class="field"><label>作業内容</label><input type="text" id="rw" placeholder="例: 水やり、追肥、草取り"></div>
      <div class="field"><label>生育状況・メモ</label><textarea id="rn" placeholder="例: トマトが赤くなり始めた。虫食いあり。"></textarea></div>
      <div class="field"><label>収穫量（任意）</label><input type="text" id="rh" placeholder="例: トマト 1kg、キュウリ 5本"></div>
      <div class="field"><label>写真（タップしてカメラ・ギャラリーから選択）</label>
        <div class="pdrop" onclick="document.getElementById('rp').click()">
          <input type="file" id="rp" accept="image/*" multiple onchange="addPh(this)">
          タップして写真を追加
        </div>
        <div class="thumbrow" id="thumbs"></div>
      </div>
    </div>
    <button class="save-btn" onclick="saveEnt()">保存する</button>
    <div style="height:20px"></div>
  </div>
</div>

<!-- LIST -->
<div class="screen" id="s-list">
  <div class="topbar"><h1>記録一覧</h1></div>
  <div class="scroll-body" id="lb-list" style="padding:12px 12px 80px;"></div>
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="go('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>ホーム</span></button>
    <button class="nav-btn active" onclick="go('list')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span>記録一覧</span></button>

<div class="sheet" id="sh">

<!-- LIGHTBOX -->
<div id="lb" onclick="this.classList.remove('open')"><img id="lbi"></div>

<script>
'use strict';
let ents=[],exps=[],svs=[],pphs=[];
let cs={wx:'',cat:''};
let calY,calM,ois=[];

function load(){try{const r=localStorage.getItem('fd_e');if(r)ents=JSON.parse(r);}catch(e){}try{const r=localStorage.getItem('fd_x');if(r)exps=JSON.parse(r);}catch(e){}}
function saveE(){try{localStorage.setItem('fd_e',JSON.stringify(ents));}catch(e){alert('保存容量不足。古い記録の写真を削除してください。');}}
function saveX(){try{localStorage.setItem('fd_x',JSON.stringify(exps));}catch(e){}}
function td(){return new Date().toLocaleDateString('sv-SE');}
function yen(n){return '¥'+Number(n).toLocaleString();}

function go(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+name).classList.add('active');
  if(name==='home')rHome();
  if(name==='list')rList();
  if(name==='cal')rCal();
  if(name==='exp')rExp();
  if(name==='print'){bPrintSel();rPrint();}
}
function goRec(){resetF();go('rec');}
function goExp(){openSheet();}

function rHome(){
  const now=new Date();const h=now.getHours();
  document.getElementById('hd').textContent=now.toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
  document.getElementById('hg').textContent=h<11?'おはようございます':h<18?'こんにちは':'お疲れ様です';
  document.getElementById('st1').textContent=ents.length;
  const m=td().slice(0,7);
  document.getElementById('st2').textContent=ents.filter(e=>e.d&&e.d.startsWith(m)).length;
  const mt=exps.filter(e=>e.d&&e.d.startsWith(m)).reduce((s,e)=>s+e.a,0);
  document.getElementById('st3').textContent=mt>=10000?'¥'+(mt/10000).toFixed(1)+'万':yen(mt);
  const rc=document.getElementById('recent');
  const lat=ents.slice(0,3);
  rc.innerHTML=lat.length?lat.map(e=>ecHTML(e,false)).join(''):'<div class="empty-st">まだ記録がありません</div>';
}

function resetF(){
  document.getElementById('rd').value=td();
  ['rt','rw','rn','rh'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('#s-rec .chip').forEach(c=>c.classList.remove('sel-wx','sel-cat'));
  cs.wx='';svs=[];pphs=[];rVT();rTH();
}
function sc(el,g,val){
  const scope=g==='cat'?document.getElementById('sh'):document.getElementById('s-rec');
  scope.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel-wx','sel-cat'));
  el.classList.add(g==='wx'?'sel-wx':'sel-cat');cs[g]=val;
}
function addV(){const i=document.getElementById('vi');const v=i.value.trim();if(!v)return;if(!svs.includes(v)){svs.push(v);rVT();}i.value='';}
function rmV(v){svs=svs.filter(x=>x!==v);rVT();}
function rVT(){document.getElementById('vtags').innerHTML=svs.map(v=>`<span class="vtag">${v}<button onclick="rmV('${v}')">×</button></span>`).join('');}
function addPh(inp){Array.from(inp.files).forEach(f=>{const r=new FileReader();r.onload=e=>{pphs.push(e.target.result);rTH();};r.readAsDataURL(f);});inp.value='';}
function rTH(){document.getElementById('thumbs').innerHTML=pphs.map((p,i)=>`<div class="twrap"><img src="${p}"><button class="rm" onclick="pphs.splice(${i},1);rTH()">×</button></div>`).join('');}
function saveEnt(){
  const date=document.getElementById('rd').value;
  const work=document.getElementById('rw').value.trim();
  if(!date||!work){alert('日付と作業内容を入力してください');return;}
  ents.unshift({id:Date.now(),d:date,tp:document.getElementById('rt').value,wx:cs.wx,cr:[...svs],wk:work,nt:document.getElementById('rn').value.trim(),hv:document.getElementById('rh').value.trim(),ph:[...pphs]});
  saveE();resetF();go('home');
}

function ecHTML(e,del){
  const crops=(e.cr&&e.cr.length)?e.cr.map(c=>`<span class="tag crop">${c}</span>`).join(''):'';
  const hv=e.hv?`<span class="tag hv">収穫</span>`:'';
  const db=del?`<button class="del-btn" onclick="delEnt(${e.id})">✕</button>`:'';
  const ph=(e.ph&&e.ph.length)?`<div class="ephotos">${e.ph.map(p=>`<img class="ephoto" src="${p}" onclick="openLb('${p}')">`).join('')}</div>`:'';
  return `<div class="ecard"><div class="etop"><div><div class="edate">${e.d}${e.tp?' ／ '+e.tp+'°C':''}</div><div class="ewrow">${e.wx?`<span class="tag wx">${e.wx}</span>`:''} ${crops}${hv}</div></div>${db}</div><div class="ework">${e.wk}</div>${e.nt?`<div class="enotes">${e.nt}</div>`:''} ${e.hv?`<div class="enotes" style="color:var(--bl);margin-top:3px;">収穫: ${e.hv}</div>`:''} ${ph}</div>`;
}
function rList(){const c=document.getElementById('lb-list');c.innerHTML=ents.length?ents.map(e=>ecHTML(e,true)).join(''):'<div class="empty-st">まだ記録がありません</div>';}
function delEnt(id){if(!confirm('削除しますか？'))return;ents=ents.filter(e=>e.id!==id);saveE();rList();}
function openLb(src){document.getElementById('lbi').src=src;document.getElementById('lb').classList.add('open');}

function rCal(){
  document.getElementById('ctitle').textContent=`${calY}年 ${calM+1}月`;
  const t=td();const dim=new Date(calY,calM+1,0).getDate();const first=new Date(calY,calM,1).getDay();
  const dip=new Date(calY,calM,0).getDate();let html='';
  for(let i=0;i<first;i++) html+=`<div class="ccell other"><div class="cnum" style="color:var(--br);">${dip-first+1+i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const de=ents.filter(e=>e.d===ds);const dx=exps.filter(e=>e.d===ds);
    const isT=ds===t;const isSu=new Date(ds).getDay()===0;const isSa=new Date(ds).getDay()===6;
    let dots='';
    if(de.length){const lbl=(de[0].cr&&de[0].cr.length)?de[0].cr[0]:de[0].wk.slice(0,4);dots+=`<div class="cpip work">${lbl}</div>`;}
    if(de.some(e=>e.hv)) dots+=`<div class="cpip hv">収穫</div>`;
    if(dx.length){const s=dx.reduce((a,e)=>a+e.a,0);dots+=`<div class="cpip money">¥${s.toLocaleString()}</div>`;}
    const nc=isSu?'color:#c0392b':isSa?'color:#2563a8':'';
    html+=`<div class="ccell${isT?' today':''}"><div class="cnum" style="${nc}">${d}</div><div class="cdots">${dots}</div></div>`;
  }
  const rem=(first+dim)%7===0?0:7-(first+dim)%7;
  for(let i=1;i<=rem;i++) html+=`<div class="ccell other"><div class="cnum" style="color:var(--br);">${i}</div></div>`;
  document.getElementById('cbody').innerHTML=html;
}
function cm(dir){calM+=dir;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}rCal();}

function rExp(){
  const m=td().slice(0,7);const[y,mo]=m.split('-');
  document.getElementById('emonth').textContent=`${y}年${parseInt(mo)}月`;
  const mt=exps.filter(e=>e.d&&e.d.startsWith(m)).reduce((s,e)=>s+e.a,0);
  document.getElementById('etotal').textContent=yen(mt);
  const c=document.getElementById('elist');
  c.innerHTML=exps.length?exps.map(e=>`<div class="exp-row-item"><span class="ecb">${e.cat}</span><div class="einfo"><div class="edesc">${e.desc}</div><div class="edatesmall">${e.d}</div></div><div class="eamt">${yen(e.a)}</div><button class="del-btn" onclick="delExp(${e.id})" style="margin-left:4px;">✕</button></div>`).join(''):'<div class="empty-st">費用の記録がありません<br>＋ボタンから追加</div>';
}
function openSheet(){
  document.getElementById('oct').value='';document.getElementById('ores').innerHTML='';
  document.getElementById('ed').value=td();document.getElementById('ea').value='';document.getElementById('edesc').value='';
  document.querySelectorAll('#sh .chip').forEach(c=>c.classList.remove('sel-cat'));cs.cat='';ois=[];
  document.getElementById('ov').classList.add('open');document.getElementById('sh').classList.add('open');
}
function closeSheet(){document.getElementById('ov').classList.remove('open');document.getElementById('sh').classList.remove('open');rExp();}
function saveExp(){
  const d=document.getElementById('ed').value;const a=parseInt(document.getElementById('ea').value);const desc=document.getElementById('edesc').value.trim();
  if(!d||!a||!desc){alert('日付・金額・内容を入力してください');return;}
  exps.unshift({id:Date.now(),d,a,desc,cat:cs.cat||'その他'});saveX();closeSheet();
}
function delExp(id){if(!confirm('削除しますか？'))return;exps=exps.filter(e=>e.id!==id);saveX();rExp();}

async function parseR(){
  const text=document.getElementById('oct').value.trim();
  if(!text){alert('テキストを貼り付けてください');return;}
  const btn=document.getElementById('obt');
  btn.innerHTML='<span class="spinner"></span>読み取り中...';btn.disabled=true;
  document.getElementById('ores').innerHTML='';
  const prompt=`以下はレシートOCRテキストです。品目・金額・日付を読み取りJSONのみ返してください。前置き不要。\n形式:{"date":"YYYY-MM-DD or null","items":[{"desc":"品目名","amt":金額数値,"cat":"資材|交通費|農薬・肥料|種・苗|その他"}]}\n合計・小計・消費税行は除外。\nテキスト:\n${text}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=data.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(raw);ois=parsed.items||[];
    const dd=parsed.date||td();
    if(!ois.length){document.getElementById('ores').innerHTML='<p style="color:var(--ts);font-size:13px;padding:7px 0;">品目が見つかりませんでした</p>';return;}
    document.getElementById('ores').innerHTML=
      `<div style="font-size:12px;color:var(--ts);margin-bottom:7px;">読み取り結果（確認・修正してから追加）</div>`+
      ois.map((it,i)=>`<div class="oi" id="oi${i}"><div class="oirow"><input class="oidesc" type="text" value="${it.desc}" id="od${i}"><input class="oiamt" type="number" value="${it.amt}" id="oa${i}"><select class="oicat" id="oc${i}">${['資材','交通費','農薬・肥料','種・苗','その他'].map(c=>`<option${c===it.cat?' selected':''}>${c}</option>`).join('')}</select></div><button class="oiadd" id="ob${i}" onclick="addOI(${i},'${dd}')">追加する</button></div>`).join('')+
      `<button class="oiall" onclick="addAllOI('${dd}')">すべて追加する</button>`;
  }catch(e){document.getElementById('ores').innerHTML='<p style="color:var(--rd);font-size:13px;padding:7px 0;">読み取りに失敗しました。もう一度お試しください。</p>';}
  finally{btn.innerHTML='AIで品目・金額を読み取る';btn.disabled=false;}
}
function addOI(i,date){
  const desc=document.getElementById(`od${i}`).value.trim();const amt=parseInt(document.getElementById(`oa${i}`).value);const cat=document.getElementById(`oc${i}`).value;
  if(!desc||!amt)return;
  exps.unshift({id:Date.now()+i,d:date,a:amt,desc,cat});saveX();
  const b=document.getElementById(`ob${i}`);b.textContent='追加済み';b.classList.add('done');b.disabled=true;
}
function addAllOI(date){let n=0;ois.forEach((_,i)=>{const b=document.getElementById(`ob${i}`);if(b&&!b.disabled){addOI(i,date);n++;}});if(n)alert(`${n}件を追加しました`);}

<h1>${y}年${parseInt(mo)}月 農業日記</h1>`;
